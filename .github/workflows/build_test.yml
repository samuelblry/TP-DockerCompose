name: Build and Test Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        run: docker build -t my-app:1.0.0 -f ./api/Dockerfile .
      - name: Build image mongo for scanning
        run: cd mongo && docker build -t my-app-mongo:1.0.0 -f ./Dockerfile .
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves, recommendations
          image: my-app:1.0.0
          file: ./Dockerfile
          only-severities: critical,high
          exit-code: false
      - name: Build the stack
        run: docker compose up -d
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}

          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
      - name: Docker ps
        run: docker ps
      - name: docker import {{ status.health }} == healthy // exit 1
        run: curl -f http://localchost:5000/users
          
